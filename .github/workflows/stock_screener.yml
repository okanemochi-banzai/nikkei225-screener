name: Stock Deviation Screener

on:
  # 毎営業日 16:30 JST = 07:30 UTC
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Japanese font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Run stock screener
        run: |
          mkdir -p output
          OUTPUT_DIR=output python stock_deviation_screener.py

      - name: Generate web dashboard
        run: |
          OUTPUT_DIR=output python generate_web_dashboard.py

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-deviation-excel
          path: output/stock_deviation_*.xlsx
          retention-days: 30

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "📊 Stock screener $(date +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/docs
          publish_branch: gh-pages
