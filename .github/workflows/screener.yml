name: Monthly Nikkei225 MA Screener

on:
  schedule:
    - cron: "0 0 28-31 * 6"
  workflow_dispatch:

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python screener.py

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nikkei225-screener-${{ github.run_id }}
          path: output/*.xlsx
          retention-days: 90

      - name: Commit output to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "📊 Update: $(date +%Y-%m-%d) screening results"
          git push
