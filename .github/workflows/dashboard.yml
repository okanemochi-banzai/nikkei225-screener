name: Ideal Deviation Dashboard

on:
  # 毎営業日 16:00 JST = 07:00 UTC（東京市場クローズ後）
  # 月〜金のみ実行
  schedule:
    - cron: '0 7 * * 1-5'
  # 手動実行も可能
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Japanese font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Run dashboard
        run: |
          mkdir -p output
          OUTPUT_DIR=output python ideal_deviation_dashboard.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "Update dashboard $(date +%Y-%m-%d)"
          git push
